<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NCP Messenger | Real-time Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* Auth Modal */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .auth-box {
            background: rgba(30, 30, 47, 0.95);
            padding: 40px;
            border-radius: 24px;
            width: 420px;
            max-width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-box h2 {
            margin-bottom: 24px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            transition: all 0.2s;
        }

        .auth-box input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.5);
        }

        .auth-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .auth-box button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .auth-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 14px;
        }

        .auth-switch span {
            color: #667eea;
            font-weight: 600;
        }

        /* Chat Container */
        .chat-container {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(30, 30, 47, 0.95);
            backdrop-filter: blur(10px);
        }

        .chat-header {
            background: rgba(20, 20, 35, 0.95);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .logout-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #e94560;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .message {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 70%;
            align-self: flex-start;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            align-self: flex-end;
        }

        .message .username {
            font-weight: 600;
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .message .text {
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .typing-indicator {
            padding: 8px 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
            min-height: 36px;
        }

        .input-area {
            padding: 16px 24px;
            background: rgba(20, 20, 35, 0.95);
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendBtn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #sendBtn:hover {
            transform: scale(1.02);
        }

        .welcome-message {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            .message { max-width: 85%; }
            .chat-header { padding: 12px 16px; }
            .input-area { padding: 12px 16px; }
            .stats { display: none; }
        }
    </style>
</head>
<body>

<!-- Auth Modal -->
<div class="auth-overlay" id="authOverlay">
    <div class="auth-box">
        <h2 id="authTitle">✨ NCP Messenger</h2>
        <input type="text" id="loginLogin" placeholder="📧 Имя пользователя или Email">
        <input type="password" id="loginPassword" placeholder="🔒 Пароль">
        <div style="display: none;" id="registerFields">
            <input type="text" id="regUsername" placeholder="👤 Имя пользователя (мин. 3 символа)">
            <input type="email" id="regEmail" placeholder="📧 Email">
            <input type="password" id="regPassword" placeholder="🔒 Пароль (мин. 4 символа)">
            <input type="password" id="regConfirm" placeholder="🔒 Повторите пароль">
        </div>
        <button id="authBtn">Войти</button>
        <div class="auth-switch" id="authSwitch">
            Нет аккаунта? <span>Зарегистрироваться</span>
        </div>
    </div>
</div>

<!-- Chat Container -->
<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <div class="logo">💬 NCP Messenger</div>
        <div class="stats">
            <span>👥 <span id="onlineCount">0</span> онлайн</span>
            <span>💬 <span id="messageCount">0</span> сообщений</span>
        </div>
        <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
    </div>
    <div class="messages" id="messages">
        <div class="welcome-message">✨ Добро пожаловать в NCP Messenger!<br>Начните общение прямо сейчас ✨</div>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Введите сообщение...">
        <button id="sendBtn">📨 Отправить</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
    let currentUser = null;
    let token = localStorage.getItem('token');
    let socket = null;
    let typingTimeout = null;
    
    // DOM элементы
    const authOverlay = document.getElementById('authOverlay');
    const chatContainer = document.getElementById('chatContainer');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const onlineCountSpan = document.getElementById('onlineCount');
    const messageCountSpan = document.getElementById('messageCount');
    const typingIndicator = document.getElementById('typingIndicator');
    
    let messageCount = 0;
    let onlineUsers = new Set();
    
    // ============ ПОМОЩНИКИ ============
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    
    function updateStatistics() {
        messageCountSpan.textContent = messageCount;
        onlineCountSpan.textContent = onlineUsers.size;
    }
    
    function addMessageToUI(message, isOwn = false, isHistory = false) {
        // Убираем welcome message если есть
        if (messagesDiv.querySelector('.welcome-message')) {
            messagesDiv.innerHTML = '';
        }
        
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message' + (isOwn ? ' own' : '');
        
        let content = `<div class="username">${escapeHtml(message.username)}</div>`;
        content += `<div class="text">${escapeHtml(message.text)}</div>`;
        content += `<div class="time">${formatTime(message.timestamp)}</div>`;
        messageDiv.innerHTML = content;
        
        messagesDiv.appendChild(messageDiv);
        if (!isHistory) {
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }
        
        if (!isHistory) {
            messageCount++;
            updateStatistics();
        }
    }
    
    // ============ АВТОРИЗАЦИЯ ============
    let isLoginMode = true;
    
    const authTitle = document.getElementById('authTitle');
    const loginLogin = document.getElementById('loginLogin');
    const loginPassword = document.getElementById('loginPassword');
    const registerFields = document.getElementById('registerFields');
    const authBtn = document.getElementById('authBtn');
    const authSwitch = document.getElementById('authSwitch');
    
    authSwitch.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            authTitle.innerHTML = '🔐 Вход в NCP Messenger';
            registerFields.style.display = 'none';
            authBtn.textContent = 'Войти';
            authSwitch.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
        } else {
            authTitle.innerHTML = '📝 Регистрация NCP Messenger';
            registerFields.style.display = 'block';
            authBtn.textContent = 'Зарегистрироваться';
            authSwitch.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
        }
    });
    
    authBtn.addEventListener('click', async () => {
        if (isLoginMode) {
            const login = loginLogin.value.trim();
            const password = loginPassword.value;
            
            if (!login || !password) {
                alert('Заполните все поля');
                return;
            }
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, password })
                });
                
                const data = await res.json();
                if (data.success) {
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    initChat();
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            }
        } else {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (!username || !email || !password) {
                alert('Заполните все поля');
                return;
            }
            
            if (username.length < 3) {
                alert('Имя пользователя должно содержать минимум 3 символа');
                return;
            }
            
            if (password.length < 4) {
                alert('Пароль должен содержать минимум 4 символа');
                return;
            }
            
            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await res.json();
                if (data.success) {
                    alert('✅ Регистрация успешна! Теперь войдите.');
                    isLoginMode = true;
                    authTitle.innerHTML = '🔐 Вход в NCP Messenger';
                    registerFields.style.display = 'none';
                    authBtn.textContent = 'Войти';
                    authSwitch.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
                    loginLogin.value = username;
                    loginPassword.value = '';
                } else {
                    alert('❌ ' + data.error);
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            }
        }
    });
    
    // ============ ОСНОВНОЙ ЧАТ ============
    async function initChat() {
        authOverlay.style.display = 'none';
        chatContainer.style.display = 'flex';
        
        // Очистка
        messagesDiv.innerHTML = '';
        messageCount = 0;
        onlineUsers.clear();
        
        // Проверка токена
        try {
            const verifyRes = await fetch('/api/verify', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const verifyData = await verifyRes.json();
            if (!verifyData.valid) throw new Error('Token invalid');
            currentUser = verifyData.user;
        } catch (err) {
            logout();
            return;
        }
        
        // Подключение WebSocket
        socket = io({
            auth: { token },
            reconnection: true,
            reconnectionAttempts: 5
        });
        
        socket.on('connect', () => {
            console.log('🔌 WebSocket подключен');
        });
        
        socket.on('connect_error', (err) => {
            console.error('WebSocket ошибка:', err.message);
            alert('Ошибка подключения к серверу');
        });
        
        socket.on('connected', (data) => {
            console.log('Приветствие:', data.message);
        });
        
        // Загрузка истории
        try {
            const res = await fetch('/api/messages', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const messages = await res.json();
            if (Array.isArray(messages)) {
                messageCount = messages.length;
                messages.forEach(msg => {
                    addMessageToUI(msg, msg.username === currentUser.username, true);
                });
                updateStatistics();
            }
        } catch (err) {
            console.error('Ошибка загрузки истории:', err);
        }
        
        // Новое сообщение
        socket.on('new_message', (msg) => {
            addMessageToUI(msg, msg.username === currentUser.username);
        });
        
        // Печатание
        socket.on('user_typing', (data) => {
            if (data.isTyping) {
                typingIndicator.textContent = `${data.username} печатает...`;
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    typingIndicator.textContent = '';
                }, 2000);
            } else {
                if (typingIndicator.textContent.includes(data.username)) {
                    typingIndicator.textContent = '';
                }
            }
        });
        
        // Отправка сообщения
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (text.length > 5000) {
                alert('Сообщение слишком длинное (макс 5000 символов)');
                return;
            }
            socket.emit('send_message', { text });
            messageInput.value = '';
            messageInput.focus();
        }
        
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
            handleTyping();
        };
        
        function handleTyping() {
            socket.emit('typing', { isTyping: true });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { isTyping: false });
            }, 1000);
        }
        
        logoutBtn.onclick = logout;
        
        // Статистика пользователей (простая)
        setInterval(async () => {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                if (stats.messages !== messageCount) {
                    // Обновляем счетчик из БД
                }
            } catch(e) {}
        }, 30000);
    }
    
    function logout() {
        localStorage.removeItem('token');
        if (socket) socket.disconnect();
        location.reload();
    }
    
    // Автоматический вход если есть токен
    if (token) {
        initChat().catch(() => {
            localStorage.removeItem('token');
            location.reload();
        });
    }
</script>
</body>
</html>
